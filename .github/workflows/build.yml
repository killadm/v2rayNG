name: Build APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        required: false
        type: string
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'
        fetch-depth: '0'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4.0.1
      with:
        log-accepted-android-sdk-licenses: false
        cmdline-tools-version: '13114758'
        packages: 'platforms;android-36.1 build-tools;36.1.0 platform-tools'

    - name: Install NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          --channel=0 \
          --install "ndk;28.2.13676358"
        echo "NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV
        sed -i '10i\
        \
            ndkVersion = "28.2.13676358"' ${{ github.workspace }}/V2rayNG/app/build.gradle.kts

    - name: Restore cached libhevtun
      id: cache-libhevtun-restore
      uses: actions/cache/restore@v4
      with:
        path: ${{ github.workspace }}/libs
        key: libhevtun-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

    - name: Build libhevtun
      if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
      run: |
        bash compile-hevtun.sh
    
    - name: Save libhevtun
      if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ${{ github.workspace }}/libs
        key: libhevtun-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

    - name: Copy libhevtun
      run: |
        cp -r ${{ github.workspace }}/libs ${{ github.workspace }}/V2rayNG/app

    - name: Fetch AndroidLibXrayLite tag
      run: |
        pushd AndroidLibXrayLite
        CURRENT_TAG=$(git describe --tags --abbrev=0)
        echo "Current tag in this repo: $CURRENT_TAG"
        echo "CURRENT_TAG=$CURRENT_TAG" >> $GITHUB_ENV
        popd

    - name: Download libv2ray
      uses: robinraju/release-downloader@v1.13
      with:
        repository: '2dust/AndroidLibXrayLite'
        tag: ${{ env.CURRENT_TAG }}
        fileName: 'libv2ray.aar'
        out-file-path: V2rayNG/app/libs/

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Check signing secrets
      id: signing
      shell: bash
      run: |
        if [ -n "${{ secrets.APP_KEYSTORE_BASE64 }}" ] && \
           [ -n "${{ secrets.APP_KEYSTORE_PASSWORD }}" ] && \
           [ -n "${{ secrets.APP_KEYSTORE_ALIAS }}" ] && \
           [ -n "${{ secrets.APP_KEY_PASSWORD }}" ]; then
          echo "mode=release" >> "$GITHUB_OUTPUT"
          echo "Installable release signing is enabled."
        else
          echo "mode=ci" >> "$GITHUB_OUTPUT"
          echo "Release signing secrets are missing. A temporary CI keystore will be generated so the APK remains installable."
        fi

    - name: Decode Keystore
      if: steps.signing.outputs.mode == 'release'
      uses: timheuer/base64-to-file@v1.2.4
      id: android_keystore
      with:
        fileName: "android_keystore.jks"
        encodedString: ${{ secrets.APP_KEYSTORE_BASE64 }}

    - name: Generate CI keystore
      if: steps.signing.outputs.mode == 'ci'
      id: ci_keystore
      shell: bash
      run: |
        KEYSTORE_PATH="${RUNNER_TEMP}/android_ci_keystore.jks"
        STORE_PASSWORD="android"
        KEY_ALIAS="androiddebugkey"
        KEY_PASSWORD="android"
        keytool -genkeypair \
          -keystore "${KEYSTORE_PATH}" \
          -storetype JKS \
          -storepass "${STORE_PASSWORD}" \
          -alias "${KEY_ALIAS}" \
          -keypass "${KEY_PASSWORD}" \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=Android Debug,O=Android,C=US"
        echo "filePath=${KEYSTORE_PATH}" >> "$GITHUB_OUTPUT"
        echo "storePassword=${STORE_PASSWORD}" >> "$GITHUB_OUTPUT"
        echo "keyAlias=${KEY_ALIAS}" >> "$GITHUB_OUTPUT"
        echo "keyPassword=${KEY_PASSWORD}" >> "$GITHUB_OUTPUT"

    - name: Build APK
      run: |
        cd ${{ github.workspace }}/V2rayNG
        echo "sdk.dir=${ANDROID_HOME}" > local.properties
        chmod 755 gradlew
        ./gradlew licenseFdroidReleaseReport
        if [ "${{ steps.signing.outputs.mode }}" = "release" ]; then
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ steps.android_keystore.outputs.filePath }} \
            -Pandroid.injected.signing.store.password=${{ secrets.APP_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.APP_KEYSTORE_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.APP_KEY_PASSWORD }}
        else
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ steps.ci_keystore.outputs.filePath }} \
            -Pandroid.injected.signing.store.password=${{ steps.ci_keystore.outputs.storePassword }} \
            -Pandroid.injected.signing.key.alias=${{ steps.ci_keystore.outputs.keyAlias }} \
            -Pandroid.injected.signing.key.password=${{ steps.ci_keystore.outputs.keyPassword }}
        fi
    
    - name: Upload arm64-v8a APK
      uses: actions/upload-artifact@v7
      if: ${{  success() }}
      with:
        name: arm64-v8a
        path: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/*/release/*arm64-v8a*.apk

    - name: Upload armeabi-v7a APK
      uses: actions/upload-artifact@v7
      if: ${{  success() }}
      with:
        name: armeabi-v7a
        path: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/*/release/*armeabi-v7a*.apk

    - name: Upload x86 APK
      uses: actions/upload-artifact@v7
      if: ${{  success() }}
      with:
        name: x86-apk
        path: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/*/release/*x86*.apk

    - name: Upload to release
      uses: svenstaro/upload-release-action@v2
      if: github.event.inputs.release_tag != ''
      with:
        file: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/*/release/*.apk
        tag: ${{ github.event.inputs.release_tag }}
        file_glob: true
        prerelease: true
